name: whatsapp_clone
description: A premium WhatsApp-like messaging app with long polling

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  dio: ^5.4.3

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  just_audio: ^0.9.40
  video_player: ^2.9.1
  cached_network_image: ^3.4.1
  record: ^6.2.0

  # Navigation
  go_router: ^14.2.7

  # UI
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  emoji_picker_flutter: ^4.4.0

  # Misc
  path_provider: ^2.1.4
  share_plus: ^10.1.0
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+2    # ← only addition
  overlay_support: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  record: ^6.2.0
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/